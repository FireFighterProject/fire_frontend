# /etc/nginx/conf.d/fire-front.conf
# certbot: sudo certbot certonly --nginx -d fire-management.rjsgud.com -d fire.rjsgud.com
# 짧은 주소 fire.rjsgud.com → fire-management.rjsgud.com (주소창 치환)

# HTTP → HTTPS (메인 도메인)
server {
    listen 80 default_server;
    server_name fire-management.rjsgud.com 54.180.139.135;
    return 301 https://$host$request_uri;
}

# HTTP → HTTPS (짧은 도메인 → 메인 도메인으로 주소창 치환)
server {
    listen 80;
    server_name fire.rjsgud.com;
    return 301 https://fire-management.rjsgud.com$request_uri;
}

# HTTPS (짧은 도메인 → 메인 도메인으로 주소창 치환)
server {
    listen 443 ssl;
    http2 on;
    server_name fire.rjsgud.com;

    ssl_certificate /etc/letsencrypt/live/fire-management.rjsgud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fire-management.rjsgud.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://fire-management.rjsgud.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name fire-management.rjsgud.com;

    ssl_certificate /etc/letsencrypt/live/fire-management.rjsgud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fire-management.rjsgud.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/ec2-user/fire-frontend;
    index index.html;

    # 정적 에셋 — 없으면 404 (index.html fallback 시 MIME type 오류 방지)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 백엔드 CORS가 배포 도메인을 허용하지 않을 때 Origin 제거 (동일 도메인 프록시)
        proxy_set_header Origin "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header Permissions-Policy "geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}

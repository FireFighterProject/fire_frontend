name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fire-front/package-lock.json

      - name: Install dependencies
        working-directory: fire-front
        run: npm ci

      - name: Build
        working-directory: fire-front
        env:
          VITE_KAKAOMAP_API_KEY: ${{ secrets.VITE_KAKAOMAP_API_KEY }}
          VITE_TMAP_API_KEY: ${{ secrets.VITE_TMAP_API_KEY }}
        run: npm run build

      - name: Pack dist
        run: tar -czf site.tgz -C fire-front/dist .

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: site.tgz
          target: /tmp/

      - name: Deploy and reload Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: sudo /usr/local/bin/deploy-fire-front
